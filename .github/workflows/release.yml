name: release

# Cuts a GitHub Release on tag push: GoReleaser cross-compiles the macOS
# binaries, archives one tarball per arch, and uploads them + SHASUMS256.txt.
# install.sh reads these assets (GitHub-first, with a CN mirror fallback).
#
# Trigger:
#   - push of a tag matching `v*` (the real release)
#   - manual workflow_dispatch (a snapshot build; artifacts only, no release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full history for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: GoReleaser (release on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser (snapshot dry-run on dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean

      - name: Upload snapshot artifacts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gtmux-snapshot
          path: |
            dist/*.tar.gz
            dist/SHASUMS256.txt
          retention-days: 14
