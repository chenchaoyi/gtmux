name: release

# Cuts a GitHub Release on tag push: GoReleaser cross-compiles the macOS
# binaries, archives one tarball per arch, and uploads them + SHASUMS256.txt.
# install.sh reads these assets (GitHub-first, with a CN mirror fallback).
#
# Trigger:
#   - push of a tag matching `v*` (the real release)
#   - manual workflow_dispatch (a snapshot build; artifacts only, no release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # GoReleaser needs full history for the changelog

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: test before release
        run: go test ./...

      - name: GoReleaser (release on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser (snapshot dry-run on dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean

      - name: Upload snapshot artifacts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: gtmux-snapshot
          path: |
            dist/*.tar.gz
            dist/SHASUMS256.txt
          retention-days: 14

  # The menu-bar app is cgo (Cocoa), so it builds on a macOS runner — separate
  # from the cgo-free CLI that goreleaser cross-compiles on Linux. It produces a
  # universal, ad-hoc-signed Gtmux.app and attaches it to the same release.
  #
  # NOTE: this job only *builds* the app — it cannot see the menu bar. Status-item
  # rendering regressions (e.g. fyne.io/systray went invisible on macOS 26) are
  # invisible to CI. Smoke-test Gtmux.app on a real macOS machine before trusting
  # a tag: launch it and confirm the colored dot + count appears in the bar.
  app:
    name: menu-bar app (macOS)
    needs: goreleaser
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: build universal binaries (CLI cgo-free, menu-bar cgo)
        run: |
          set -euxo pipefail
          mkdir -p build
          for arch in arm64 amd64; do
            CGO_ENABLED=1 GOOS=darwin GOARCH=$arch \
              go build -ldflags "-X main.version=${GITHUB_REF_NAME}" \
              -o "build/menubar-$arch" ./cmd/gtmux-menubar
            CGO_ENABLED=0 GOOS=darwin GOARCH=$arch \
              go build -ldflags "-s -w -X github.com/chenchaoyi/gtmux/internal/app.Version=${GITHUB_REF_NAME}" \
              -o "build/gtmux-$arch" ./cmd/gtmux
          done
          lipo -create -output build/gtmux-menubar build/menubar-arm64 build/menubar-amd64
          lipo -create -output build/gtmux build/gtmux-arm64 build/gtmux-amd64

      - name: assemble + ad-hoc-sign Gtmux.app
        run: |
          set -euxo pipefail
          APP=Gtmux.app
          mkdir -p "$APP/Contents/MacOS"
          cp internal/app/templates/Gtmux.Info.plist "$APP/Contents/Info.plist"
          cp build/gtmux-menubar "$APP/Contents/MacOS/gtmux-menubar"
          cp build/gtmux "$APP/Contents/MacOS/gtmux"
          chmod +x "$APP/Contents/MacOS/"*
          codesign --force --deep --sign - "$APP"
          codesign -dv "$APP" || true
          ZIP="Gtmux-${GITHUB_REF_NAME#v}-macos.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: attach Gtmux.app to the release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "$ZIP" --clobber

      - name: upload app artifact (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: gtmux-app
          path: ${{ env.ZIP }}
          retention-days: 14
