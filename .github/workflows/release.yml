name: release

# Cuts a GitHub Release on tag push: GoReleaser cross-compiles the macOS
# binaries, archives one tarball per arch, and uploads them + SHASUMS256.txt.
# install.sh reads these assets (GitHub-first, with a CN mirror fallback).
#
# Trigger:
#   - push of a tag matching `v*` (the real release)
#   - manual workflow_dispatch (a snapshot build; artifacts only, no release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # GoReleaser needs full history for the changelog

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: gate before release (same as PR CI)
        # `make check` = gofmt + go vet + staticcheck + go test -race, so a tag
        # can't ship a regression that a PR's CI would have caught (the old
        # `go test ./...` here skipped -race and staticcheck).
        run: make check

      - name: GoReleaser (release on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pushes the regenerated CLI cask to chenchaoyi/homebrew-tap. The
          # default GITHUB_TOKEN can't write to another repo, so this must be a
          # PAT (classic, `repo` scope) stored as the HOMEBREW_TAP_TOKEN secret.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Bakes the hosted-tunnel gate into release binaries. Empty if the
          # secret is unset → hosted `gtmux tunnel` falls back to --quick.
          GTMUX_TUNNEL_REG: ${{ secrets.GTMUX_TUNNEL_REG }}
          GTMUX_RELAY_TOKEN: ${{ secrets.GTMUX_RELAY_TOKEN }}

      - name: GoReleaser (snapshot dry-run on dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean
        env:
          HOMEBREW_TAP_TOKEN: ""
          GTMUX_TUNNEL_REG: ${{ secrets.GTMUX_TUNNEL_REG }}
          GTMUX_RELAY_TOKEN: ${{ secrets.GTMUX_RELAY_TOKEN }}

      - name: Upload snapshot artifacts (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: gtmux-snapshot
          path: |
            dist/*.tar.gz
            dist/SHASUMS256.txt
          retention-days: 14

  # The menu-bar app is cgo (Cocoa), so it builds on a macOS runner — separate
  # from the cgo-free CLI that goreleaser cross-compiles on Linux. It produces a
  # universal, ad-hoc-signed Gtmux.app and attaches it to the same release.
  #
  # NOTE: this job only *builds* the app — it cannot see the menu bar. Status-item
  # rendering regressions (the menu bar is native AppKit now) are invisible to
  # CI. Smoke-test Gtmux.app on a real macOS machine before trusting a tag:
  # launch it and confirm the colored dot + count appears, and the popover opens.
  app:
    name: menu-bar app (macOS)
    needs: goreleaser
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      # Import the Developer ID cert into a throwaway keychain and wire up
      # notarization — ONLY when the signing secrets are set. Without them the build
      # falls back to ad-hoc (still works, but Gatekeeper-blocked on other Macs).
      # Required repo secrets (5): MACOS_CERT_P12 (base64 .p12), MACOS_CERT_PASSWORD,
      # MACOS_NOTARY_KEY_P8 (base64 App Store Connect API key), MACOS_NOTARY_KEY_ID,
      # MACOS_NOTARY_ISSUER. The signing identity is auto-derived from the cert.
      # See docs/release-signing.md.
      - name: set up Developer ID signing + notarization (when configured)
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_NOTARY_KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12:-}" ]; then
            echo "no MACOS_CERT_P12 secret → ad-hoc build (Gatekeeper-blocked on other Macs)"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/gtmux-signing.keychain-db"
          KPW="$(openssl rand -hex 20)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          # Make the new keychain searchable (keep the login one) + let codesign use
          # the key without an interactive prompt.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Auto-derive the signing identity from the imported cert (no separate secret).
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep -o '"Developer ID Application:[^"]*"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then echo "no 'Developer ID Application' identity in the imported cert" >&2; exit 1; fi
          echo "GTMUX_SIGN_ID=$IDENTITY" >> "$GITHUB_ENV"
          echo "signing identity: $IDENTITY"
          if [ -n "${MACOS_NOTARY_KEY_P8:-}" ]; then
            echo "$MACOS_NOTARY_KEY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"
            echo "GTMUX_NOTARY_KEY=$RUNNER_TEMP/notary.p8" >> "$GITHUB_ENV"
            echo "GTMUX_NOTARY_KEY_ID=$MACOS_NOTARY_KEY_ID" >> "$GITHUB_ENV"
            echo "GTMUX_NOTARY_ISSUER=$MACOS_NOTARY_ISSUER" >> "$GITHUB_ENV"
          fi
          echo "Developer ID signing configured"

      # macapp/build.sh compiles the Swift app (universal), builds the cgo-free gtmux
      # CLI to bundle alongside it, assembles Gtmux.app, and signs it — Developer ID
      # + notarize + staple when GTMUX_SIGN_ID/GTMUX_NOTARY_* are set (above), else ad-hoc.
      - name: build Gtmux.app (universal, signed)
        run: GTMUX_UNIVERSAL=1 GTMUX_VERSION="${GITHUB_REF_NAME}" macapp/build.sh
        env:
          GTMUX_TUNNEL_REG: ${{ secrets.GTMUX_TUNNEL_REG }}
          GTMUX_RELAY_TOKEN: ${{ secrets.GTMUX_RELAY_TOKEN }}

      - name: zip the bundle
        run: |
          set -euxo pipefail
          ZIP="Gtmux-${GITHUB_REF_NAME#v}-macos.zip"
          ditto -c -k --keepParent macapp/build/Gtmux.app "$ZIP"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: attach Gtmux.app to the release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "$ZIP" --clobber

      # GoReleaser publishes the CLI cask (gtmux); the menu-bar app is built
      # here, outside GoReleaser, so publish its cask (gtmux-app) by hand to the
      # same tap. Needs the cross-repo PAT (HOMEBREW_TAP_TOKEN).
      - name: publish Gtmux.app cask to the tap (tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping app cask publish" >&2
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          TAP="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/chenchaoyi/homebrew-tap.git" "$TAP"
          mkdir -p "$TAP/Casks"
          cat > "$TAP/Casks/gtmux-app.rb" <<CASK
          # Published by gtmux's release workflow. DO NOT EDIT.
          cask "gtmux-app" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/chenchaoyi/gtmux/releases/download/v#{version}/Gtmux-#{version}-macos.zip"
            name "Gtmux"
            desc "Menu-bar companion for the gtmux session overview"
            homepage "https://github.com/chenchaoyi/gtmux"

            depends_on macos: ">= :ventura"

            app "Gtmux.app"

            zap trash: [
              "~/Library/Preferences/com.gtmux.menubar.plist",
            ]
          end
          CASK
          cd "$TAP"
          git config user.name chenchaoyi
          git config user.email ccy.chenchaoyi@gmail.com
          git add Casks/gtmux-app.rb
          if git diff --cached --quiet; then
            echo "cask unchanged"
          else
            git commit -m "gtmux-app ${VERSION}"
            git push
          fi

      - name: upload app artifact (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: gtmux-app
          path: ${{ env.ZIP }}
          retention-days: 14
