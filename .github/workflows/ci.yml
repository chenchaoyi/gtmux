name: ci

# Build + vet on every push / PR so a broken commit never reaches a tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build (darwin/arm64 + darwin/amd64)
        run: |
          GOOS=darwin GOARCH=arm64 go build -o /dev/null .
          GOOS=darwin GOARCH=amd64 go build -o /dev/null .
