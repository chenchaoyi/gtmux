name: ci

# Format, vet, lint, test (with the race detector), and cross-build on every
# push / PR so a broken commit never reaches a tag. The cgo menu-bar app is
# compiled on a macOS runner; the CLI stays cgo-free and builds everywhere.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: go test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1

      # Architecture + design-palette invariants (also run on macOS with swift test).
      - name: design + architecture conformance
        run: ./scripts/check-design.sh

  cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      # The CLI must stay cgo-free (only the menu-bar app uses cgo). Build both
      # macOS arches with CGO off to enforce that and catch arch-specific breaks.
      - name: build CLI cgo-free (darwin arm64 + amd64)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/gtmux
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o /dev/null ./cmd/gtmux

  menubar:
    name: menu-bar app build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # The menu-bar app is native Swift (macapp/); compile + unit-test it here so
      # a PR can't break it unnoticed. (Linux jobs above can't build Swift/AppKit.)
      - name: swift build (release)
        run: cd macapp && swift build -c release

      - name: swift test (model + design conformance)
        run: cd macapp && swift test

      - name: design + architecture conformance
        run: ./scripts/check-design.sh
