# GoReleaser config for gtmux.
# Cross-compiles the pure-Go binary (no cgo — gtmux only execs tmux/osascript),
# archives one tarball per macOS arch, and emits SHASUMS256.txt. The release
# workflow (.github/workflows/release.yml) runs `goreleaser release` on tag push;
# install.sh fetches these assets (GitHub-first, CN-mirror fallback).
version: 2

project_name: gtmux

before:
  hooks:
    - go mod tidy

builds:
  - id: gtmux
    main: ./cmd/gtmux
    binary: gtmux
    env:
      - CGO_ENABLED=0
    # macOS only for now: focus/restore drive Ghostty via AppleScript.
    # agents/overview are cross-platform, but the positioning is Ghostty+macOS;
    # add linux/windows here when there's demand.
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/chenchaoyi/gtmux/internal/app.Version={{ .Version }}
      # Hosted-tunnel registration gate, injected from the GTMUX_TUNNEL_REG CI
      # secret (empty if unset → hosted mode tells the user to use --quick).
      - -X github.com/chenchaoyi/gtmux/internal/app.TunnelRegSecret={{ .Env.GTMUX_TUNNEL_REG }}
      # Push-relay token, injected from the GTMUX_RELAY_TOKEN CI secret (empty →
      # serve simply doesn't forward push).
      - -X github.com/chenchaoyi/gtmux/internal/app.RelayToken={{ .Env.GTMUX_RELAY_TOKEN }}

archives:
  - id: gtmux
    # gtmux-<version>-darwin-<arch>.tar.gz — install.sh builds this exact name.
    name_template: "gtmux-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - README.zh.md

checksum:
  # install.sh fetches SHASUMS256.txt and verifies the tarball against it.
  name_template: "SHASUMS256.txt"
  algorithm: sha256

release:
  github:
    owner: chenchaoyi
    name: gtmux
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew distribution for the CLI. `brews` (formulae) is deprecated in
# GoReleaser, so the binary ships as a cask; gtmux is macOS-only anyway, so
# the cask's platform limit is a non-issue. The menu-bar app ships as a
# separate cask (gtmux-app) published from the release workflow's app job.
homebrew_casks:
  - name: gtmux
    binaries:
      - gtmux
    repository:
      owner: chenchaoyi
      name: homebrew-tap
      branch: main
      # Cross-repo push needs a PAT; the default GITHUB_TOKEN can't write to
      # another repo. Set HOMEBREW_TAP_TOKEN in this repo's Actions secrets.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/chenchaoyi/gtmux"
    description: "tmux/Ghostty session overview for macOS"
    commit_author:
      name: chenchaoyi
      email: ccy.chenchaoyi@gmail.com
    # The release binary is unsigned; strip the quarantine bit so the CLI runs
    # without a Gatekeeper prompt after `brew install`.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gtmux"]
          end
