# gtmux self-hosted tunnel — nginx stream SNI router (TLS passthrough).
# Sits on :443 and splits by TLS SNI WITHOUT decrypting (ssl_preread):
#   tunnel.ccy.dev  -> Caddy (127.0.0.1:4443), which terminates TLS for the gtmux tunnel
#   everything else -> xray VLESS-REALITY (127.0.0.1:8443), incl. its www.ivi.tv camouflage
# Installed to /etc/nginx/stream.d/gtmux-sni.conf; nginx.conf gets a top-level
# `stream { include /etc/nginx/stream.d/*.conf; }` block (see install-server.sh).
# The mail server (25/110/143/993/995) and SSH (22) are untouched.

map $ssl_preread_server_name $gtmux_backend {
    tunnel.ccy.dev  127.0.0.1:4443;   # gtmux tunnel (Caddy)
    default         127.0.0.1:8443;   # xray VLESS-REALITY (default keeps its camouflage intact)
}

server {
    listen 443 reuseport;
    listen [::]:443 reuseport;
    ssl_preread on;                    # read SNI from the ClientHello, do NOT terminate TLS
    proxy_pass $gtmux_backend;
    proxy_timeout 1h;                  # long-lived SSE / tunnel connections
    proxy_connect_timeout 5s;
}
