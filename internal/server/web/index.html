<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gtmux</title>
  <link rel="stylesheet" href="vendor/xterm.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="bar">
    <div class="bar-inner">
      <button id="back" hidden>‹</button>
      <span id="title">gtmux</span>
      <span id="sub"></span>
      <span id="conn" class="conn"></span>
      <div id="mode" hidden>
        <button data-mode="chat">Chat</button>
        <button data-mode="term">Terminal</button>
      </div>
      <button id="gear" hidden title="Appearance">Aa</button>
    </div>
  </header>

  <!-- appearance: font + size -->
  <div id="settings" hidden>
    <div class="srow">
      <label>Font</label>
      <select id="font-sel">
        <option value="auto">Match terminal</option>
        <option value="system">System</option>
        <option value="Hack">Hack</option>
        <option value="JetBrains Mono">JetBrains Mono</option>
        <option value="Fira Code">Fira Code</option>
        <option value="IBM Plex Mono">IBM Plex Mono</option>
      </select>
    </div>
    <div class="srow">
      <label>Size</label>
      <input id="size-rng" type="range" min="10" max="22" step="1" />
      <span class="sz" id="size-val"></span>
    </div>
  </div>

  <!-- pairing / error gate -->
  <section id="gate" hidden>
    <div class="gate-box">
      <div class="gate-dot"></div>
      <p id="gate-msg"></p>
    </div>
  </section>

  <!-- desktop workbench: session tree rail + freeform board of concurrent panes
       (wide screens only; <900px falls back to the single-column radar→pane). -->
  <section id="workbench" hidden>
    <header id="wb-bar">
      <span class="wb-brand"><span class="wb-mark"><i></i><i class="lit"></i><i class="wide"></i></span>gtmux</span>
      <button id="wb-snap" class="wb-toggle" title="Snap to grid"><span class="wb-sw"></span>贴齐网格</button>
      <button id="wb-surface" class="wb-toggle" title="Auto-surface waiting">⤢ 自动浮出 waiting</button>
      <span class="wb-spacer"></span>
      <span id="wb-conn" class="conn"></span>
      <button id="wb-gear" title="Appearance">Aa</button>
    </header>
    <div id="wb-body">
      <aside id="rail">
        <div id="rail-head">
          <span class="rail-title">Sessions</span>
          <span class="rail-spacer"></span>
          <input id="rail-search" placeholder="⌕ search" />
          <button id="rail-collapse" title="Collapse sidebar">⇤</button>
        </div>
        <div id="tree"></div>
        <div class="rail-hint">拖 pane 到画板 · 双击全屏</div>
        <div id="rail-resize" title="Drag to resize"><span></span></div>
      </aside>
      <button id="rail-tab" hidden title="Show sidebar">⇥<span id="rail-tab-n"></span></button>
      <div id="board"></div>
    </div>
  </section>

  <!-- agent radar -->
  <section id="radar" hidden></section>

  <!-- pane mirror -->
  <section id="pane" hidden>
    <div id="term"></div>
  </section>

  <!-- chat history (对话 mode) -->
  <section id="chat" hidden></section>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
  <script src="vendor/addon-unicode11.js"></script>
  <script src="app.js"></script>
</body>
</html>
